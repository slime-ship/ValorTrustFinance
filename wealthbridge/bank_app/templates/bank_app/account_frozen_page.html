<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Transaction • Nova Trust Finance</title>

    <!-- Tawk.to Script -->

            Tawk_LoadStart = new Date();

    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <style>
        /* ───────── RESET & BASE ───────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #0b0e1a;
            background: radial-gradient(ellipse at 20% 50%, #141b3a 0%, #070a14 100%);
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* ───────── ANIMATED BACKGROUND ORBS ───────── */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-orbs span {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.20;
            animation: orbFloat 25s ease-in-out infinite alternate;
        }
        .bg-orbs .orb1 {
            width: 600px;
            height: 600px;
            background: #2d4bff;
            top: -200px;
            left: -200px;
            animation-duration: 18s;
        }
        .bg-orbs .orb2 {
            width: 500px;
            height: 500px;
            background: #e23838;
            bottom: -150px;
            right: -150px;
            animation-duration: 22s;
            animation-delay: 2s;
            opacity: 0.12;
        }
        .bg-orbs .orb3 {
            width: 300px;
            height: 300px;
            background: #ffb900;
            top: 30%;
            left: 50%;
            animation-duration: 26s;
            animation-delay: 4s;
            opacity: 0.08;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(80px, -60px) scale(1.2);
            }
        }

        /* ───────── TELEGRAM FLOATING BUTTON ───────── */
        .telegram-float {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            z-index: 999;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0088cc, #006699);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 8px 32px rgba(0, 136, 204, 0.35);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-decoration: none;
            animation: telegramBounce 2.5s infinite;
        }
        .telegram-float:hover {
            transform: scale(1.1) translateY(-3px);
            color: #fff;
        }
        @keyframes telegramBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        /* ───────── MAIN CARD ───────── */
        .pending-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            padding: 2.8rem 2rem 2.5rem;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.8s ease;
            opacity: 0;
            transform: translateY(30px) scale(0.97);
        }
        .pending-wrapper.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* ───────── CARD GLOW ACCENT ───────── */
        .pending-wrapper::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 32px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(226, 56, 56, 0.25), rgba(255, 185, 0, 0.15), rgba(226, 56, 56, 0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* ───────── ICON ───────── */
        .status-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(226, 56, 56, 0.12);
            border: 1px solid rgba(226, 56, 56, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.6rem;
            color: #ff6b7a;
            animation: pulseIcon 2s ease-in-out infinite;
        }
        @keyframes pulseIcon {
            0%, 100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        /* ───────── HEADER ───────── */
        .pending-wrapper h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        .pending-wrapper h2 span {
            background: linear-gradient(135deg, #ff6b7a, #ffb900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .pending-wrapper .subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        /* ───────── MESSAGE ───────── */
        .message-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 1.8rem;
        }
        .message-box p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }
        .message-box .highlight {
            color: #ff6b7a;
            font-weight: 500;
        }

        /* ───────── ACTION BUTTON ───────── */
        .btn-support {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2.2rem;
            background: linear-gradient(135deg, #4a6cf7, #3b5de7);
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 28px rgba(74, 108, 247, 0.2);
        }
        .btn-support:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(74, 108, 247, 0.35);
            background: linear-gradient(135deg, #5a7aff, #4a6cf7);
            color: #fff;
            text-decoration: none;
        }
        .btn-support:active {
            transform: translateY(0) scale(0.97);
        }

        /* ───────── LOADING ANIMATION (inline) ───────── */
        .loader-wrap {
            margin: 0 auto 1.5rem;
            width: 180px;
            height: 90px;
        }
        .loader-wrap svg {
            width: 100%;
            height: 100%;
        }

        /* ───────── RESPONSIVE ───────── */
        @media (max-width: 480px) {
            .pending-wrapper {
                padding: 2rem 1.5rem 2rem;
                border-radius: 24px;
            }
            .pending-wrapper h2 {
                font-size: 1.3rem;
            }
            .status-icon {
                width: 64px;
                height: 64px;
                font-size: 2rem;
            }
            .btn-support {
                width: 100%;
                justify-content: center;
                padding: 0.85rem;
            }
            .telegram-float {
                width: 48px;
                height: 48px;
                font-size: 1.3rem;
                bottom: 1.25rem;
                left: 1.25rem;
            }
            .loader-wrap {
                width: 140px;
                height: 70px;
            }
        }

        /* ───────── ANIMATIONS ───────── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
        .fade-in-d1 {
            animation-delay: 0.1s;
            opacity: 0;
        }
        .fade-in-d2 {
            animation-delay: 0.2s;
            opacity: 0;
        }
        .fade-in-d3 {
            animation-delay: 0.3s;
            opacity: 0;
        }
    </style>
</head>
<body>

    <!-- ─── BACKGROUND ORBS ─── -->
    <div class="bg-orbs">
        <span class="orb1"></span>
        <span class="orb2"></span>
        <span class="orb3"></span>
    </div>

    <!-- ─── TELEGRAM FLOAT ─── -->
    <a href="https://t.me/CUSTOMER_SUPPORT_1485" class="telegram-float" target="_blank" aria-label="Telegram support">
        <i class="fab fa-telegram"></i>
    </a>

    <!-- ─── MAIN CARD ─── -->
    <div class="pending-wrapper" id="pendingWrapper">
        <!-- Status Icon -->
        <div class="status-icon fade-in fade-in-d1">
            <i class="fas fa-clock"></i>
        </div>

        <!-- Title -->
        <h2 class="fade-in fade-in-d1">
            Transaction <span>Frozen</span>
        </h2>
        <p class="subtitle fade-in fade-in-d1">Your account is temporarily on hold</p>

        <!-- Loader Animation -->
        <div class="loader-wrap fade-in fade-in-d1">
            <svg viewBox="0 0 256 128" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#ff6b7a" />
                        <stop offset="50%" stop-color="#ffb900" />
                        <stop offset="100%" stop-color="#4a6cf7" />
                    </linearGradient>
                    <linearGradient id="grad2" x1="1" y1="0" x2="0" y2="0">
                        <stop offset="0%" stop-color="#4a6cf7" />
                        <stop offset="50%" stop-color="#ffb900" />
                        <stop offset="100%" stop-color="#ff6b7a" />
                    </linearGradient>
                </defs>
                <g fill="none" stroke-linecap="round" stroke-width="16">
                    <g class="ip__track" stroke="rgba(255,255,255,0.04)">
                        <path d="M8,64s0-56,60-56,60,112,120,112,60-56,60-56"/>
                        <path d="M248,64s0-56-60-56-60,112-120,112S8,64,8,64"/>
                    </g>
                    <g stroke-dasharray="180 656">
                        <path class="ip__worm1" stroke="url(#grad1)" stroke-dashoffset="0" d="M8,64s0-56,60-56,60,112,120,112,60-56,60-56"/>
                        <path class="ip__worm2" stroke="url(#grad2)" stroke-dashoffset="358" d="M248,64s0-56-60-56-60,112-120,112S8,64,8,64"/>
                    </g>
                </g>
            </svg>
        </div>

        <!-- Message -->
        <div class="message-box fade-in fade-in-d2">
            <p>
                Your account transactions have been temporarily frozen due to
                <span class="highlight">suspicious activity</span>.
                Please contact customer support for verification and assistance.
            </p>
        </div>

        <!-- Action Button -->
        <a href="https://t.me/CUSTOMER_SUPPORT_1485" target="_blank" class="btn-support fade-in fade-in-d3">
            <i class="fas fa-headset"></i> Contact Support
        </a>
    </div>

    <!-- ─── SCRIPTS ─── -->
    <script>
        // ─── Show card with fade-in ───
        document.addEventListener('DOMContentLoaded', function() {
            const wrapper = document.getElementById('pendingWrapper');
            wrapper.classList.add('visible');
        });

        // ─── Inject keyframe for loader if not already present ───
        (function injectLoaderStyles() {
            const style = document.createElement('style');
            style.textContent = `
                .ip__worm1, .ip__worm2 {
                    animation: worm1 2s linear infinite;
                }
                .ip__worm2 {
                    animation-name: worm2;
                }
                @keyframes worm1 {
                    from { stroke-dashoffset: 0; }
                    50% { animation-timing-function: steps(1); stroke-dashoffset: -358; }
                    50.01% { animation-timing-function: linear; stroke-dashoffset: 358; }
                    to { stroke-dashoffset: 0; }
                }
                @keyframes worm2 {
                    from { stroke-dashoffset: 358; }
                    50% { stroke-dashoffset: 0; }
                    to { stroke-dashoffset: -358; }
                }
            `;
            document.head.appendChild(style);
        })();
    </script>

</body>
</html>
