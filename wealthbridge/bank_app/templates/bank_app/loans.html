{% load humanize %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Application • Nova Trust Finance</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <style>
        /* ───────── RESET & BASE ───────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e1a;
            background: radial-gradient(ellipse at 20% 50%, #141b3a 0%, #070a14 100%);
            min-height: 100vh;
            padding-bottom: 80px;
            color: #fff;
            overflow-x: hidden;
        }

        /* ───────── ANIMATED BACKGROUND ORBS ───────── */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-orbs span {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.20;
            animation: orbFloat 25s ease-in-out infinite alternate;
        }
        .bg-orbs .orb1 {
            width: 600px;
            height: 600px;
            background: #2d4bff;
            top: -200px;
            left: -200px;
            animation-duration: 18s;
        }
        .bg-orbs .orb2 {
            width: 500px;
            height: 500px;
            background: #00b8d4;
            bottom: -150px;
            right: -150px;
            animation-duration: 22s;
            animation-delay: 2s;
        }
        .bg-orbs .orb3 {
            width: 300px;
            height: 300px;
            background: #7c4dff;
            top: 40%;
            left: 60%;
            animation-duration: 26s;
            animation-delay: 4s;
            opacity: 0.12;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(80px, -60px) scale(1.2);
            }
        }

        /* ───────── TELEGRAM FLOATING BUTTON ───────── */
        .telegram-float {
            position: fixed;
            bottom: 90px;
            right: 20px;
            z-index: 999;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0088cc, #006699);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 8px 32px rgba(0, 136, 204, 0.35);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-decoration: none;
            animation: telegramBounce 2.5s infinite;
        }
        .telegram-float:hover {
            transform: scale(1.1) translateY(-3px);
            color: #fff;
        }
        @keyframes telegramBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        /* ───────── NAVBAR ───────── */
        .navbar-modern {
            position: relative;
            z-index: 10;
            background: rgba(11, 14, 26, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-modern .menu-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .navbar-modern .brand {
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: -0.02em;
        }
        .navbar-modern .brand span {
            background: linear-gradient(135deg, #4a6cf7, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-links {
            display: none;
            flex-direction: column;
            background: rgba(11, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            animation: slideDown 0.3s ease forwards;
        }
        .navbar-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: color 0.3s;
        }
        .navbar-links a:hover {
            color: #fff;
        }
        .navbar-links a:last-child {
            border-bottom: none;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ───────── MAIN CONTENT ───────── */
        .main-content {
            position: relative;
            z-index: 1;
            padding: 1.5rem 1rem 2rem;
            max-width: 640px;
            margin: 0 auto;
        }

        /* ───────── GLASS CARD ───────── */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            padding: 2rem 1.8rem;
            margin-bottom: 1.25rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        .glass-card .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .glass-card .card-title span {
            background: linear-gradient(135deg, #4a6cf7, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glass-card .card-title .badge-icon {
            font-size: 1.6rem;
            color: rgba(74, 108, 247, 0.4);
        }
        .glass-card .card-sub {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        /* ───────── STATUS INDICATOR ───────── */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 212, 255, 0.06);
            border: 1px solid rgba(0, 212, 255, 0.08);
            border-radius: 40px;
            padding: 0.3rem 1rem 0.3rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #5ee0ff;
            margin-bottom: 1.2rem;
        }
        .status-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #5ee0ff;
            animation: dotPulse 2s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%, 100% {
                opacity: 0.4;
                transform: scale(0.9);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* ───────── FORM ELEMENTS ───────── */
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-container .input-icon {
            position: absolute;
            left: 1rem;
            color: rgba(255, 255, 255, 0.2);
            font-size: 1rem;
            pointer-events: none;
            transition: color 0.3s;
            z-index: 2;
        }
        .input-container input,
        .input-container textarea {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            resize: vertical;
        }
        .input-container textarea {
            padding-top: 0.8rem;
            min-height: 80px;
        }
        .input-container input::placeholder,
        .input-container textarea::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 300;
        }
        .input-container input:focus,
        .input-container textarea:focus {
            border-color: rgba(74, 108, 247, 0.4);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.06);
        }
        .input-container input:focus~.input-icon,
        .input-container textarea:focus~.input-icon {
            color: rgba(74, 108, 247, 0.6);
        }
        /* Textarea icon positioning */
        .input-container.textarea-icon .input-icon {
            top: 1rem;
            transform: none;
        }

        /* ───────── BUTTON ───────── */
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #4a6cf7, #3b5de7);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 28px rgba(74, 108, 247, 0.25);
            margin-top: 0.5rem;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(74, 108, 247, 0.35);
            background: linear-gradient(135deg, #5a7aff, #4a6cf7);
        }
        .btn-submit:active {
            transform: translateY(0) scale(0.98);
        }

        /* ───────── BOTTOM NAV ───────── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: rgba(11, 14, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-around;
            padding: 0.6rem 0 0.8rem;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s;
            font-size: 0.65rem;
        }
        .bottom-nav .nav-item i {
            font-size: 1.4rem;
            margin-bottom: 0.2rem;
        }
        .bottom-nav .nav-item:hover,
        .bottom-nav .nav-item.active {
            color: #4a6cf7;
        }

        /* ───────── ANIMATIONS ───────── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .fade-up {
            animation: fadeUp 0.6s ease forwards;
        }
        .fade-up-d1 {
            animation-delay: 0.05s;
            opacity: 0;
        }
        .fade-up-d2 {
            animation-delay: 0.1s;
            opacity: 0;
        }
        .fade-up-d3 {
            animation-delay: 0.15s;
            opacity: 0;
        }
        .fade-up-d4 {
            animation-delay: 0.2s;
            opacity: 0;
        }
        .fade-up-d5 {
            animation-delay: 0.25s;
            opacity: 0;
        }

        /* ───────── RESPONSIVE ───────── */
        @media (max-width: 600px) {
            .glass-card {
                padding: 1.5rem 1.2rem;
            }
            .glass-card .card-title {
                font-size: 1.2rem;
            }
            .telegram-float {
                width: 48px;
                height: 48px;
                font-size: 1.3rem;
                bottom: 80px;
                right: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── BACKGROUND ORBS ─── -->
    <div class="bg-orbs">
        <span class="orb1"></span>
        <span class="orb2"></span>
        <span class="orb3"></span>
    </div>

    <!-- ─── TELEGRAM FLOAT ─── -->
    <a href="https://t.me/CUSTOMER_SUPPORT_1485" class="telegram-float" target="_blank" aria-label="Telegram support">
        <i class="fab fa-telegram"></i>
    </a>

    <!-- ─── NAVBAR ─── -->
    <nav class="navbar-modern">
        <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">
            <i class="fas fa-bars"></i>
        </button>
        <span class="brand">Nova <span>Trust</span></span>
        <div style="width: 2rem;"></div>
        <div class="navbar-links" id="navbarLinks">
            <a href="{% url 'dashboard' %}"><i class="fas fa-home mr-2"></i>Home</a>
            <a href="{% url 'setting' %}"><i class="fas fa-cog mr-2"></i>Accounts</a>
            <a href="{% url 'transaction' %}"><i class="fas fa-list-ul mr-2"></i>Transactions</a>
            <a href="{% url 'reset_profile' %}"><i class="fas fa-user-edit mr-2"></i>Settings</a>
            <a href="{% url 'logout' %}"><i class="fas fa-sign-out-alt mr-2"></i>Logout</a>
        </div>
    </nav>

    <!-- ─── MAIN CONTENT ─── -->
    <div class="main-content">

        <div class="glass-card fade-up fade-up-d1">
            <!-- Status Indicator -->
            <div class="status-indicator">
                <span class="dot"></span>
                Loan Application · Secure
            </div>

            <div class="card-title">
                <span>Loan</span> Application
                <span class="badge-icon"><i class="bi bi-hand-thumbs-up"></i></span>
            </div>
            <div class="card-sub">Apply for a loan quickly and securely</div>

            <form id="loanApplicationForm">
                <!-- Full Name -->
                <div class="form-group fade-up fade-up-d2">
                    <label for="fullName">Full Name</label>
                    <div class="input-container">
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                        <span class="input-icon"><i class="fas fa-user"></i></span>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group fade-up fade-up-d2">
                    <label for="email">Email</label>
                    <div class="input-container">
                        <input type="email" id="email" placeholder="Enter your email address" required>
                        <span class="input-icon"><i class="fas fa-envelope"></i></span>
                    </div>
                </div>

                <!-- Phone Number -->
                <div class="form-group fade-up fade-up-d3">
                    <label for="phoneNumber">Phone Number</label>
                    <div class="input-container">
                        <input type="tel" id="phoneNumber" placeholder="Enter your phone number" required>
                        <span class="input-icon"><i class="fas fa-phone"></i></span>
                    </div>
                </div>

                <!-- Loan Amount -->
                <div class="form-group fade-up fade-up-d3">
                    <label for="loanAmount">Loan Amount</label>
                    <div class="input-container">
                        <input type="number" id="loanAmount" placeholder="Enter desired loan amount" required min="1" step="0.01">
                        <span class="input-icon"><i class="fas fa-coins"></i></span>
                    </div>
                </div>

                <!-- Loan Purpose -->
                <div class="form-group fade-up fade-up-d4">
                    <label for="loanPurpose">Loan Purpose</label>
                    <div class="input-container textarea-icon">
                        <textarea id="loanPurpose" placeholder="Enter the purpose of the loan" rows="3" required></textarea>
                        <span class="input-icon"><i class="fas fa-pen"></i></span>
                    </div>
                </div>

                <button type="submit" class="btn-submit fade-up fade-up-d5">
                    <i class="fas fa-paper-plane mr-2"></i> Submit Application
                </button>
            </form>
        </div>

    </div>

    <!-- ─── BOTTOM NAV ─── -->
    <nav class="bottom-nav">
        <a href="{% url 'dashboard' %}" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="{% url 'bank' %}" class="nav-item">
            <i class="fas fa-exchange-alt"></i>
            <span>Transfer</span>
        </a>
        <a href="#" class="nav-item active">
            <i class="fas fa-chart-line"></i>
            <span>Overview</span>
        </a>
        <a href="{% url 'setting' %}" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- ─── SCRIPTS ─── -->
    <script>
        // ─── Navbar toggle ───
        const menuBtn = document.getElementById('menuBtn');
        const navbarLinks = document.getElementById('navbarLinks');
        menuBtn.addEventListener('click', () => {
            navbarLinks.style.display = navbarLinks.style.display === 'flex' ? 'none' : 'flex';
        });

        // ─── Form submission → redirect to KYC ───
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('loanApplicationForm').addEventListener('submit', function(event) {
                event.preventDefault();

                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const phoneNumber = document.getElementById('phoneNumber').value;
                const loanAmount = document.getElementById('loanAmount').value;
                const loanPurpose = document.getElementById('loanPurpose').value;

                // Basic validation
                if (!fullName || !email || !phoneNumber || !loanAmount || !loanPurpose) {
                    alert('Please fill in all fields.');
                    return;
                }

                // Redirect to KYC page with query parameters
                const url = `{% url 'kyc' %}?fullName=${encodeURIComponent(fullName)}&email=${encodeURIComponent(email)}&phoneNumber=${encodeURIComponent(phoneNumber)}&loanAmount=${encodeURIComponent(loanAmount)}&loanPurpose=${encodeURIComponent(loanPurpose)}`;
                window.location.href = url;
            });
        });

        // ─── Telegram button ───
        document.querySelector('.telegram-float')?.addEventListener('click', function(e) {
            window.open('https://t.me/CUSTOMER_SUPPORT_1485', '_blank');
        });
    </script>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
          </html>
